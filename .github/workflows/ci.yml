name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  client:
    name: Client — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies (root workspaces)
        run: npm ci
        working-directory: .
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Upload bundle artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  server:
    name: Server — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies (root workspaces)
        run: npm ci
        working-directory: .
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [client, server]
    # Only run when explicitly opted in via label, since the suite needs a DB
    if: contains(github.event.pull_request.labels.*.name, 'run-e2e') || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lixiops
          POSTGRES_PASSWORD: lixiops
          POSTGRES_DB: lixiops_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lixiops:lixiops@localhost:5432/lixiops_test
      JWT_SECRET: ci-secret-with-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prisma db push
        run: npx prisma db push --skip-generate
        working-directory: server
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: client
      - name: Run smoke suite
        run: npm run test:e2e
        working-directory: client
